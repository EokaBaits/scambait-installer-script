# =============================================================================
# Proxmox / QEMU HOST configuration (required for real BIOS masking)
# =============================================================================
# Guest PowerShell CANNOT rewrite what msinfo32 / dxdiag read from SMBIOS.
# Apply this on the Proxmox host, then fully shut down and start the VM
# (reboot alone is not always enough for SMBIOS changes).
#
# Edit VMID, then run the qm set commands (or paste into /etc/pve/qemu-server/VMID.conf).
# =============================================================================

# Example - Dell OptiPlex persona (base64-encoded SMBIOS fields):
#
#   qm set 100 -smbios1 "uuid=$(cat /proc/sys/kernel/random/uuid),manufacturer=$(echo -n 'Dell Inc.' | base64 -w0),product=$(echo -n 'OptiPlex 7070' | base64 -w0),version=$(echo -n '1.0.0' | base64 -w0),serial=$(echo -n '5QK2R93' | base64 -w0),sku=$(echo -n '07A1' | base64 -w0),family=$(echo -n 'OptiPlex' | base64 -w0),base64=1"
#
# Hide KVM hypervisor bit from naive guest checks:
#
#   qm set 100 -args "-cpu host,-hypervisor,kvm=off"
#
# Or in the conf file:
#
#   args: -cpu host,-hypervisor,kvm=off
#   smbios1: uuid=........,manufacturer=RGVsbCBJbmMu,product=T3B0aVBsZXggNzA3MA==,version=MS4wLjA=,serial=NVFLMlI5Mw==,sku=MDdBMQ==,family=T3B0aVBsZXg=,base64=1
#
# Optional hardening against "this is a VM" tells:
#   - Use Intel/AMD CPU type that matches your story (not "QEMU Virtual CPU")
#   - Prefer virtio sparingly if scammers dig Device Manager; IDE/SATA looks more "PC"
#   - Spoof NIC MAC to a real OEM OUI (Dell/HP/Realtek), not QEMU's 52:54:00
#   - Disable or disguise QEMU Guest Agent (the guest installer also renames it)
#   - agent: 0   (if you do not need GA)
#
# After changes:
#   qm shutdown 100 && qm start 100
#
# Verify inside Windows:
#   msinfo32  -> System Manufacturer / System Model
#   dxdiag    -> System Information
#   There should be NO "QEMU", "Standard PC (i440FX)", "SeaBIOS", "proxmox", "KVM"
#
# Precomputed base64 for the Dell example above:
#   Dell Inc.       -> RGVsbCBJbmMu
#   OptiPlex 7070   -> T3B0aVBsZXggNzA3MA==
#   1.0.0           -> MS4wLjA=
#   5QK2R93         -> NVFLMlI5Mw==
#   07A1            -> MDdBMQ==
#   OptiPlex        -> T3B0aVBsZXg=

# Ready-to-paste conf snippet (replace uuid with a unique value):
smbios1: uuid=11111111-2222-3333-4444-555555555555,manufacturer=RGVsbCBJbmMu,product=T3B0aVBsZXggNzA3MA==,version=MS4wLjA=,serial=NVFLMlI5Mw==,sku=MDdBMQ==,family=T3B0aVBsZXg=,base64=1
args: -cpu host,-hypervisor,kvm=off
agent: 0

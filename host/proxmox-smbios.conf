# =============================================================================
# Proxmox HOST config - VM 104 (Windows 11 / Dell OptiPlex 7020 + i7-14700 story)
# =============================================================================
# Guest cannot rewrite real CPUID cache topology. Do what QEMU allows + match
# cores/threads to the CPU name you claim.
#
# Real i7-14700: 20 cores (8P+12E), 28 threads, 33MB L3, P-base ~2.1 GHz
# Your screenshot (8C/8T + 14700 name + L2>L3) is inconsistent - fix topology.
#
# QEMU cannot emulate hybrid P/E or exact Intel cache sizes. Closest bait setup:
#   - 1 socket, 14 cores, 2 threads = 28 logical processors (matches thread count)
#   - host + model_id + tsc-frequency + host-cache-info=off
#   - guest installer patches ~MHz / ProcessorNameString
# =============================================================================

# --- recommended (claim i7-14700, 28 threads) ---
#
# qm shutdown 104
#
# qm set 104 -smbios1 "uuid=$(cat /proc/sys/kernel/random/uuid),manufacturer=$(echo -n 'Dell Inc.' | base64 -w0),product=$(echo -n 'OptiPlex 7020' | base64 -w0),version=$(echo -n '1.2.0' | base64 -w0),serial=$(echo -n '7XK9M2A' | base64 -w0),sku=$(echo -n '0B0B' | base64 -w0),family=$(echo -n 'OptiPlex' | base64 -w0),base64=1"
#
# qm set 104 -sockets 1 -cores 14 -threads 2 -vcpus 28
# qm set 104 -cpu host
# qm set 104 -args "-cpu host,-hypervisor,kvm=off,host-cache-info=off,l3-cache=on,tsc-frequency=2100000000,model_id='Intel(R) Core(TM) i7-14700'"
# qm set 104 -agent 0
# qm set 104 -net0 e1000e,bridge=vmbr0,macaddr=D8:9E:F3:A1:4C:7B,firewall=0
# qm set 104 -machine q35
#
# qm start 104
#
# --- lighter alternative (only ~8 vCPUs available): do NOT claim 14700 ---
# Use a real 8C/8T chip name instead:
#
# qm set 104 -sockets 1 -cores 8 -threads 1 -vcpus 8
# qm set 104 -args "-cpu host,-hypervisor,kvm=off,host-cache-info=off,l3-cache=on,tsc-frequency=3000000000,model_id='Intel(R) Core(TM) i7-9700'"
#
# --- mid alternative (8C/16T): ---
# qm set 104 -sockets 1 -cores 8 -threads 2 -vcpus 16
# qm set 104 -args "-cpu host,-hypervisor,kvm=off,host-cache-info=off,l3-cache=on,tsc-frequency=2900000000,model_id='Intel(R) Core(TM) i7-11700'"

# What each flag does:
#   host-cache-info=off  -> stop passing your Xeon cache layout into the guest
#   l3-cache=on          -> present a shared L3 to Windows (better than L2>L3 nonsense)
#   tsc-frequency=...    -> influences Task Manager base speed (Hz)
#   model_id=...         -> CPU name string (not Xeon)
#
# Cache sizes in Task Manager will still not be perfect Intel datasheet numbers.
# Anyone running Coreinfo can still see "this is not a real 14700 die".

smbios1: uuid=11111111-2222-3333-4444-555555555555,manufacturer=RGVsbCBJbmMu,product=T3B0aVBsZXggNzAyMA==,version=MS4yLjA=,serial=N1hLOU0yQQ==,sku=MEIwQg==,family=T3B0aVBsZXg=,base64=1
args: -cpu host,-hypervisor,kvm=off,host-cache-info=off,l3-cache=on,tsc-frequency=2100000000,model_id='Intel(R) Core(TM) i7-14700'
agent: 0
